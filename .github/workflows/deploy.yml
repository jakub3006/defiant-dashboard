name: Scrape data and deploy to GitHub Pages

# When this workflow runs
# -----------------------
# 1. Twice daily via cron — both times chosen so we always scrape AFTER
#    the relevant releases, never before (which would just pull yesterday's
#    data and waste an Actions run):
#
#    - 16:00 UTC ≈ 11:00 ET (winter) / 12:00 ET (summer)
#      Captures the US morning macro releases:
#        * 08:30 ET: NFP, CPI, PPI, Unemployment, Jobless Claims
#        * 09:45 ET: Chicago PMI
#        * 10:00 ET: ISM Mfg, ISM Services, UoM Sentiment
#      Earliest UTC time that's safely after all of these year-round
#      (DST shifts ET ± 1h vs UTC; 16:00 UTC is post-release in both).
#
#    - 23:00 UTC ≈ 18:00 ET (winter) / 19:00 ET (summer)
#      Captures end-of-day market data:
#        * 16:15 ET: VIX EOD close (yfinance)
#        * 16:15 ET: 10Y Treasury via H.15 (FRED DGS10)
#        * 16:30 ET (Thu): Fed Balance Sheet H.4.1 (FRED WALCL)
#      VIX EOD is at 21:15 UTC winter / 20:15 UTC summer — 23:00 UTC
#      is safely past in both seasons.
#
# 2. On any push to main (so a code change deploys immediately).
#    The bot's data-commit step appends "[skip ci]" so the deploy doesn't
#    trigger another run on itself.
# 3. Manual trigger via the "Run workflow" button in the Actions tab.
on:
  schedule:
    - cron: "0 16 * * *"
    - cron: "0 23 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

# `contents: write` is needed so the bot can commit refreshed JSON back to
# the repo (we need this for the historical-merge logic in
# _merge_rows_to_file to keep working — fresh-clone runs would lose the
# manually-seeded history otherwise).
# `pages: write` + `id-token: write` are required by actions/deploy-pages.
permissions:
  contents: write
  pages: write
  id-token: write

# If a manual run starts while the cron is running (or vice versa), let both
# finish — the second one will just overwrite with the freshest data. We do
# group them so two Pages deploys never race against each other.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # --- Python: run the scraper -----------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraping/requirements.txt

      - name: Install Python deps
        run: pip install -r scraping/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Scrape fresh data
        env:
          # FRED_API_KEY is a Repository Secret (Settings → Secrets and
          # variables → Actions → "New repository secret"). The scraper
          # reads it for the FRED phase; everything else is keyless.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scraping/daily_scrape.py

      - name: Commit refreshed JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            # [skip ci] prevents this commit from triggering the workflow
            # again via the on.push trigger — only the cron and manual
            # dispatch will re-run.
            git commit -m "chore(data): scrape $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          fi

      # --- Node: build the Vite site --------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build site
        # Custom domain (see public/CNAME) means the site lives at
        # https://gatekeeperdesk.com/ — root path, no subpath. Vite's
        # default base of '/' is correct, so we don't set BASE_PATH.
        # If you ever switch back to a github.io project page, set
        # BASE_PATH: /<repo-name>/ here.
        run: npm run build

      # --- Deploy to GitHub Pages -----------------------------------------
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
