name: Scrape data and deploy to GitHub Pages

# When this workflow runs
# -----------------------
# 1. Twice daily via cron:
#    - 12:00 UTC ≈ 07:00 ET — catches morning US macro releases (NFP, CPI, ...)
#    - 22:00 UTC ≈ 17:00 ET — catches the EOD VIX close + any late releases
# 2. On any push to main (so a code change deploys immediately).
#    The bot's data-commit step appends "[skip ci]" so the deploy doesn't
#    trigger another run on itself.
# 3. Manual trigger via the "Run workflow" button in the Actions tab.
on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 22 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

# `contents: write` is needed so the bot can commit refreshed JSON back to
# the repo (we need this for the historical-merge logic in
# _merge_rows_to_file to keep working — fresh-clone runs would lose the
# manually-seeded history otherwise).
# `pages: write` + `id-token: write` are required by actions/deploy-pages.
permissions:
  contents: write
  pages: write
  id-token: write

# If a manual run starts while the cron is running (or vice versa), let both
# finish — the second one will just overwrite with the freshest data. We do
# group them so two Pages deploys never race against each other.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # --- Python: run the scraper -----------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraping/requirements.txt

      - name: Install Python deps
        run: pip install -r scraping/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Scrape fresh data
        env:
          # FRED_API_KEY is a Repository Secret (Settings → Secrets and
          # variables → Actions → "New repository secret"). The scraper
          # reads it for the FRED phase; everything else is keyless.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scraping/daily_scrape.py

      - name: Commit refreshed JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            # [skip ci] prevents this commit from triggering the workflow
            # again via the on.push trigger — only the cron and manual
            # dispatch will re-run.
            git commit -m "chore(data): scrape $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          fi

      # --- Node: build the Vite site --------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build site
        env:
          # GitHub Pages serves at https://<user>.github.io/<repo>/, so
          # every asset URL needs the /<repo>/ prefix. The Vite config
          # picks BASE_PATH up and bakes it into the build.
          # If you rename the repo, change this in lockstep.
          BASE_PATH: /defiant-dashboard/
        run: npm run build

      # --- Deploy to GitHub Pages -----------------------------------------
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
